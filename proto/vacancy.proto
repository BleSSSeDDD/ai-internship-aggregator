syntax = "proto3";

package vacancy;

option go_package = "./gen/go/vacancy";
option java_package = "com.aggregator.internship";
option java_multiple_files = true;

message CompanyInternship {
  string company_name = 1;     
  string source_url = 2;       // Ссылка на оригинал вакансии
  string source_site = 3;      // Название площадки
  
  // ОДНО направление внутри одной программы стажировки
  string position_name = 4;         
  repeated string tech_stack = 5;    // Список технологий: ["Go", "PostgreSQL", "gRPC"]
  
  int32 min_salary = 6;             // Нижний порог ЗП (0, если не указано)
  
  string location = 7;              // Город или "Remote"
  string internship_dates = 8;      // Сроки проведения (например, "Лето 2024")
  string selection_process = 9;     // Описание этапов: "Контест, собес, финал"
  string description = 10;           // Краткое описание задач
  string application_deadline = 11;  // До какого числа принимают заявки
  
  string contact_info = 12;          
  string experience_requirements = 13; // Что нужно знать
}