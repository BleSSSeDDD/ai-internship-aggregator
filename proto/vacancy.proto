syntax = "proto3";

package vacancy;

option go_package = "./gen/go/vacancy";
option java_package = "com.aggregator.internship";
option java_multiple_files = true;

message CompanyInternship {
  string company_name = 1;     
  string source_url = 2;       // Ссылка на оригинал вакансии
  string source_site = 3;      // Название площадки
  
  // Список направлений внутри одной программы стажировки
  repeated Track tracks = 4;
}

// Отдельное направление
message Track {
  string position_name = 1;         
  repeated string tech_stack = 2;    // Список технологий: ["Go", "PostgreSQL", "gRPC"]
  
  int32 min_salary = 3;             // Нижний порог ЗП (0, если не указано)
  
  string location = 4;              // Город или "Remote"
  string internship_dates = 5;      // Сроки проведения (например, "Лето 2024")
  string selection_process = 6;     // Описание этапов: "Контест, собес, финал"
  string description = 7;           // Краткое описание задач
  string application_deadline = 8;  // До какого числа принимают заявки
  
  string contact_info = 9;          
  string experience_requirements = 10; // Что нужно знать
}