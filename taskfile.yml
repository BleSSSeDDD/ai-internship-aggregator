version: '3'

tasks:
  default:
    desc: Show available commands
    cmds:
      - task --list

  up-with-model:
    desc: Start all services and pull model
    cmds:
      - task: up
      - echo "Waiting for Ollama to be ready..."
      - |
        while ! docker exec internship-ollama ollama list > /dev/null 2>&1; do
          echo "Still waiting..."
          sleep 2
        done
      - echo "Ollama ready, pulling model..."
      - task: ollama-pull
      - task: kafka-create-topic

  up:
    desc: Start all services
    cmds:
      - echo "Starting services..."
      - docker compose build --no-cache parser
      - docker compose up -d
      - echo "Done. Kafka UI http://localhost:8080"
      - task ps

  down:
    desc: Stop all services
    cmds:
      - echo "Stopping services..."
      - docker compose down
      - echo "All services stopped"

  destroy:
    desc: Stop and remove everything (including volumes)
    cmds:
      - echo "WARNING This will delete ALL data!"
      - docker compose down -v
      - echo "Everything removed"

  restart:
    desc: Restart all services
    cmds:
      - task down
      - task up

  logs:
    desc: Show logs (Ctrl+C to exit)
    cmds:
      - docker compose logs -f

  ps:
    desc: Show container status
    cmds:
      - docker compose ps

  kafka-shell:
    desc: Open shell in Kafka container
    cmds:
      - docker exec -it internship-kafka bash

  kafka-topics:
  desc: List Kafka topics
  cmds:
    - docker exec internship-kafka /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092

  kafka-create-topic:
    desc: Create a topic (use TOPIC=name)
    cmds:
      - docker exec internship-kafka /opt/kafka/bin/kafka-topics.sh --create --topic {{.TOPIC}} --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1 --if-not-exists
    vars:
      TOPIC: '{{.TOPIC | default "internships"}}'

  kafka-consume:
    desc: Consume messages from topic (use TOPIC=name)
    cmds:
      - docker exec -it internship-kafka /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server localhost:9092 --topic {{.TOPIC}} --from-beginning
    vars:
      TOPIC: '{{.TOPIC | default "internships"}}'

  kafka-produce:
    desc: Produce test message (use TOPIC=name)
    cmds:
      - echo "test message" | docker exec -i internship-kafka /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server localhost:9092 --topic {{.TOPIC}}
    vars:
      TOPIC: '{{.TOPIC | default "internships"}}'

  ollama-pull:
    desc: Pull Ollama model (default qwen2.5:3b)
    cmds:
      - docker exec internship-ollama ollama pull {{.MODEL}}
    vars:
      MODEL: '{{.MODEL | default "qwen2.5:3b"}}'

  ollama-list:
    desc: List Ollama models
    cmds:
      - docker exec internship-ollama ollama list

  pg-shell:
    desc: Open PostgreSQL shell
    cmds:
      - docker exec -it internship-postgres psql -U app -d aggregator

  status:
    desc: Show status of all services
    cmds:
      - task: ps
      - echo ""
      - echo "Kafka topics:"
      - task: kafka-topics
      - echo ""
      - echo "Ollama models:"
      - task: ollama-list